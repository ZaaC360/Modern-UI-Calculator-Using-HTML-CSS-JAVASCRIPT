<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body> 
    <button id="themeToggle" style="color: white; background-color: #161616; padding: 5px 10px; border-radius: 5px;">Theme</button>
    <section class="background" ;>
        <h1 align="center" id = "title"></h1>
            
                <button id="historyButton">History</button>
                
                <div id="historyPanel">
                     <div class="historyHeader">
                        <span id="historyTitle">History</span>
                        <button id="closeHistory">✖</button>
                    </div>
                    <ul id="historyList"></ul>
                </div>

            </div>
        <input type="text" id="display" disabled>
        <div id="buttons">
            <button class="btn" data-value="7">7</button>
            <button class="btn" data-value="8">8</button>
            <button class="btn" data-value="9">9</button>
            <button class="btn" data-value="/">÷</button>
<br>
            <button class="btn" data-value="4">4</button>
            <button class="btn" data-value="5">5</button>
            <button class="btn" data-value="6">6</button>
            <button class="btn" data-value="*">×</button>
<br>
            <button class="btn" data-value="1">1</button>
            <button class="btn" data-value="2">2</button>
            <button class="btn" data-value="3">3</button>
            <button class="btn" data-value="-">-</button>
<br>
            <button class="btn" data-value="0">0</button>
            <button  id="clear">C</button>
            <button  id="equals">=</button>
            <button class="btn" data-value="+">+</button>
        </div>
    </section>
<script src="script.js"></script>
</body>
</html>
